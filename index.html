<style>
  :root{
    --chalk:#eef3ee; --chalk-dim:#9db09d; --chalk-yellow:#f5e6a3;
    --chalk-blue:#a8d0e6; --chalk-pink:#f0b8c8; --chalk-green:#a8e6b0;
    --board:#1f3328; --board-edge:#0e1a14; --panel:#1a120c; --panel2:#241a12;
    --warn:#f0a868;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#1a120c;color:var(--chalk);display:flex;flex-direction:column;height:100dvh;
    user-select:none;-webkit-user-select:none;}

  /* 상단 메인 탭 */
  #mainTabs{flex:0 0 auto;display:flex;background:#0d0906;padding:env(safe-area-inset-top) 0 0;}
  .mtab{flex:1;background:none;border:none;color:var(--chalk-dim);font-size:14px;font-weight:700;
    padding:13px 0 11px;border-bottom:2.5px solid transparent;}
  .mtab.active{color:var(--chalk-yellow);border-bottom-color:var(--chalk-yellow);}

  .view{flex:1 1 auto;min-height:0;display:none;flex-direction:column;}
  .view.active{display:flex;}

  /* ===== 사전 뷰 ===== */
  #dictSearchWrap{flex:0 0 auto;padding:10px 12px 6px;background:var(--panel);}
  #dictSearchBox{position:relative;}
  #dictSearch{width:100%;background:var(--panel2);border:1px solid #4a3320;border-radius:11px;
    color:var(--chalk);font-size:16px;padding:12px 42px 12px 14px;outline:none;}
  #dictSearch::placeholder{color:#8a7058;}
  #dictSearch:focus{border-color:#7a5230;}
  #dictClear{position:absolute;right:6px;top:50%;transform:translateY(-50%);
    width:30px;height:30px;border:none;background:#3a2818;border-radius:50%;
    color:var(--chalk-dim);font-size:17px;line-height:1;display:none;align-items:center;justify-content:center;}
  #dictClear.show{display:flex;}
  #dictClear:active{background:#4a3320;}
  #dictHint{font-size:11px;color:var(--chalk-dim);margin-top:6px;line-height:1.5;}
  #dictHint b{color:var(--chalk-green);}

  #dictBody{flex:1 1 auto;overflow-y:auto;padding:4px 12px calc(env(safe-area-inset-bottom) + 16px);}

  /* 칩(추천 단어) */
  #chips{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0 4px;}
  .chip{background:var(--panel2);border:1px solid #3a2818;border-radius:16px;
    color:var(--chalk-blue);font-size:13px;padding:7px 13px;}
  .chip:active{background:#2e2016;}

  /* 검색 결과 카드 */
  .subCard{background:#15241c;border:1px solid #2a4034;border-radius:13px;
    padding:14px 15px;margin-bottom:10px;}
  .subCard .sHead{display:flex;align-items:center;gap:10px;}
  .subCard .sEmoji{font-size:30px;line-height:1;}
  .subCard .sName{font-size:20px;font-weight:700;color:var(--chalk);}
  .subCard .sKind{font-size:10px;color:var(--chalk-dim);border:1px solid #3a5045;
    border-radius:5px;padding:2px 6px;margin-left:auto;}
  .subCard.med{background:#1a1c2c;border-color:#33375a;}
  .subCard .sKind.kMed{color:#bcd0f5;border-color:#4a5285;}
  .subCard .medNote{margin-top:10px;font-size:10px;color:#8a93b5;border-top:1px solid #2a2e4a;padding-top:8px;line-height:1.4;}
  .subCard.drug{background:#2a1614;border-color:#5a2e28;}
  .subCard .sKind.kDrug{color:#f5b8b0;border-color:#7a3a30;background:#3a1c18;}
  .subCard .drugEl{margin-top:10px;font-size:12px;}
  .subCard .drugEl .elList{color:#f0c0b8;font-weight:600;}
  .subCard .drugNote{margin-top:10px;font-size:10px;color:#d59a92;border-top:1px solid #5a2e28;padding-top:8px;line-height:1.4;}
  .subCard .sDef{font-size:13px;color:var(--chalk-blue);margin-top:9px;line-height:1.55;}
  .subCard .sMakeup{margin-top:11px;}
  .subCard .sLabel{font-size:11px;color:var(--chalk-yellow);letter-spacing:1px;margin-bottom:5px;}
  .makeChips{display:flex;flex-wrap:wrap;gap:5px;}
  .makeChip{background:#11221a;border:1px solid #2f4a3c;border-radius:7px;
    font-size:12px;color:var(--chalk-green);padding:4px 9px;}
  .subCard .sRows{margin-top:11px;display:flex;flex-direction:column;gap:7px;}
  .sRow{display:flex;gap:8px;font-size:12px;line-height:1.5;}
  .sRow .rk{flex:0 0 42px;color:var(--chalk-yellow);font-weight:600;}
  .sRow .rv{flex:1;color:var(--chalk-dim);}
  .sRow.danger .rv{color:var(--warn);}

  .noHit{text-align:center;color:var(--chalk-dim);font-size:14px;line-height:1.9;margin-top:30px;padding:0 20px;}
  .noHit b{color:var(--chalk-blue);}
  #dictCount{text-align:center;font-size:11px;color:var(--chalk-dim);margin:10px 0 4px;}

  /* ===== 조합 게임 뷰 ===== */
  #boardWrap{flex:1 1 auto;position:relative;margin:8px 8px 4px;border-radius:8px;
    background:linear-gradient(135deg,#7a5230,#5b3b22);padding:9px;
    box-shadow:0 6px 20px rgba(0,0,0,.5);min-height:0;display:flex;}
  #board{flex:1;border-radius:4px;position:relative;
    background:radial-gradient(120% 90% at 30% 20%, #294135 0%, var(--board) 55%, var(--board-edge) 120%);
    box-shadow:inset 0 0 40px rgba(0,0,0,.55);display:flex;flex-direction:column;overflow:hidden;}
  #board::after{content:"";position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);background-size:7px 7px;opacity:.5;}
  #boardHead{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
    padding:7px 12px 5px;border-bottom:1px dashed rgba(200,220,200,.18);margin:0 10px;}
  #boardHead .ttl{font-size:12px;color:var(--chalk-dim);letter-spacing:2px;}
  #boardHead .disc{font-size:11px;color:var(--chalk-dim);}
  #boardHead .disc b{color:var(--chalk-yellow);}
  #equation{flex:0 0 auto;display:flex;flex-wrap:wrap;align-content:flex-start;gap:6px;
    padding:10px 14px;min-height:50px;}
  #equation.empty{align-items:center;justify-content:center;}
  #emptyHint{color:var(--chalk-dim);font-size:13px;text-align:center;line-height:1.6;}
  .token{display:inline-flex;align-items:baseline;gap:1px;font-size:25px;font-weight:600;
    color:var(--chalk);padding:1px 5px;border-radius:7px;position:relative;text-shadow:0 0 8px rgba(238,243,238,.25);}
  .token .cnt{font-size:15px;color:var(--chalk-yellow);margin-left:1px;}
  .token .x{position:absolute;top:-7px;right:-7px;width:17px;height:17px;background:#7a3030;
    border-radius:50%;font-size:11px;color:#fff;display:flex;align-items:center;justify-content:center;}
  .plus{font-size:22px;color:var(--chalk-dim);align-self:center;}
  #result{flex:1 1 auto;overflow-y:auto;padding:4px 14px 12px;
    border-top:1px dashed rgba(200,220,200,.18);margin:0 10px;min-height:0;display:flex;flex-direction:column;}
  #molCanvas{width:100%;height:130px;flex:0 0 auto;display:none;}
  #molCanvas.show{display:block;}
  .rFormula{font-size:27px;font-weight:700;color:var(--chalk);text-align:center;margin-top:2px;}
  .rName{font-size:16px;color:var(--chalk-yellow);text-align:center;margin-top:2px;}
  .rDesc{font-size:12px;color:var(--chalk-blue);margin-top:8px;line-height:1.55;text-align:center;}
  .rState{font-size:12px;color:var(--chalk-dim);text-align:center;margin-top:5px;}
  .rDetail{margin-top:12px;padding-top:10px;border-top:1px dashed rgba(200,220,200,.18);display:flex;flex-direction:column;gap:8px;text-align:left;}

<body>
  <div id="mainTabs">

    </div></div>

<script>
/* ===== 일상 물질 사전 데이터 ===== */
const SUBSTANCES = [
  {id:'cola',name:'콜라',kind:'mixture',emoji:'🥤',def:'갈색 탄산음료. 여러 화합물이 섞인 혼합물이에요.',makeup:['물(H₂O)','설탕(C₁₂H₂₂O₁₁)','탄산(CO₂)','인산(H₃PO₄)','카페인(C₈H₁₀N₄O₂)'],history:'1886년 미국 약사 존 펨버턴이 약용 시럽으로 처음 만들었어요.',use:'기호식품. 인산이 톡 쏘는 신맛, 탄산이 청량감을 줘요.',risk:'설탕과 산이 많아 치아 부식·비만 위험. 카페인 각성 효과.'},
  {id:'carbonation',name:'탄산',kind:'compound',emoji:'🫧',def:'물에 이산화탄소가 녹아 생긴 약한 산(H₂CO₃). 톡 쏘는 청량감의 정체.',makeup:['이산화탄소(CO₂)','물(H₂O)'],history:'1767년 조지프 프리스틀리가 물에 CO₂를 녹여 처음 만들었어요.',use:'탄산음료, 사이다, 맥주의 거품.',risk:'그 자체는 안전. 과음 시 더부룩함.'},
  {id:'sugar',name:'설탕',kind:'compound',emoji:'🍬',def:'단맛을 내는 자당(C₁₂H₂₂O₁₁). 포도당과 과당이 결합한 것.',makeup:['자당(C₁₂H₂₂O₁₁)'],history:'사탕수수에서 추출, 인도에서 기원전부터 만들었어요.',use:'감미료, 보존제, 발효 원료.',risk:'과다 섭취 시 비만·당뇨·충치.'},
  {id:'vinegar',name:'식초',kind:'mixture',emoji:'🍶',def:'신맛 나는 조미료. 물에 아세트산이 녹아 있어요.',makeup:['아세트산(CH₃COOH)','물(H₂O)'],history:'술이 자연 발효되며 우연히 발견, 수천 년 역사.',use:'조미료, 절임, 청소·살균.',risk:'고농도는 피부·눈 자극.'},
  {id:'salt',name:'소금',kind:'compound',emoji:'🧂',def:'짠맛을 내는 염화나트륨(NaCl).',makeup:['염화나트륨(NaCl)'],history:'고대부터 채취, 급여(salary)의 어원이 될 만큼 귀했어요.',use:'조미료, 식품 보존, 제설.',risk:'과다 섭취 시 고혈압.'},
  {id:'msg',name:'미원',kind:'compound',emoji:'🍜',aliases:['msg','글루탐산','조미료'],def:'감칠맛 조미료. 글루탐산나트륨(MSG).',makeup:['글루탐산나트륨(C₅H₈NO₄Na)'],history:'1908년 일본 이케다 기쿠나에가 다시마에서 감칠맛 성분을 발견.',use:'감칠맛을 더하는 조미료.',risk:'일반적으로 안전하다고 평가돼요.'},
  {id:'baking_soda',name:'베이킹소다',kind:'compound',emoji:'🧁',aliases:['중조','탄산수소나트륨'],def:'빵을 부풀리는 흰 가루. 탄산수소나트륨(NaHCO₃).',makeup:['탄산수소나트륨(NaHCO₃)'],history:'19세기부터 제빵·청소에 널리 쓰였어요.',use:'제빵 팽창제, 청소, 탈취, 제산제.',risk:'대체로 안전. 과다 섭취 시 나트륨 과잉.'},
  {id:'alcohol',name:'술',kind:'mixture',emoji:'🍺',aliases:['알코올','에탄올'],def:'취하게 하는 음료. 핵심 성분은 에탄올(C₂H₅OH).',makeup:['에탄올(C₂H₅OH)','물(H₂O)'],history:'곡물·과일의 자연 발효로 선사시대부터 존재.',use:'음료, 소독, 연료, 용매.',risk:'중독성, 간 손상, 메탄올 혼입 시 실명·사망.'},
  {id:'caffeine',name:'카페인',kind:'compound',emoji:'☕',def:'각성 효과가 있는 알칼로이드(C₈H₁₀N₄O₂).',makeup:['카페인(C₈H₁₀N₄O₂)'],history:'1819년 독일 룽게가 커피에서 분리했어요.',use:'커피·차·에너지드링크의 각성 성분, 두통약.',risk:'과다 시 불면·심계항진. 치사량은 매우 높음.'},
  {id:'oil',name:'식용유',kind:'mixture',emoji:'🫗',aliases:['기름','지방'],def:'요리에 쓰는 기름. 지방산 글리세라이드의 혼합물.',makeup:['트라이글리세라이드(지방)'],history:'올리브·콩 등에서 고대부터 짜냈어요.',use:'조리, 튀김, 비누·바이오디젤 원료.',risk:'과열 시 발화, 산패하면 유해.'},
  {id:'nail',name:'손톱',kind:'material',emoji:'💅',aliases:['발톱','케라틴'],def:'케라틴이라는 단백질로 된 단단한 조직.',makeup:['케라틴(단백질)','황(S) 결합'],history:'척추동물이 진화하며 발톱·손톱으로 발달.',use:'손끝 보호, 물건 집기.',risk:'없음. 황 결합이 단단함의 비결이에요.'},
  {id:'hair',name:'머리카락',kind:'material',emoji:'💇',aliases:['모발','털'],def:'손톱과 같은 케라틴 단백질 섬유.',makeup:['케라틴(단백질)'],history:'포유류의 체온 유지·보호 기관에서 진화.',use:'보온, 보호, 감각.',risk:'없음. 파마는 황 결합을 끊고 다시 잇는 원리예요.'},

  {id:'blood',name:'피',kind:'mixture',emoji:'🩸',aliases:['혈액'],def:'산소를 나르는 붉은 체액. 철을 품은 헤모글로빈이 붉은색의 원인.',makeup:['물','헤모글로빈(철 Fe 포함)','적혈구·혈장'],history:'생명체의 순환계와 함께 진화.',use:'산소·영양 운반, 면역, 체온 조절.',risk:'없음. 철 결핍 시 빈혈.'},
  {id:'sweat',name:'땀',kind:'mixture',emoji:'💧',def:'체온을 식히는 분비액. 대부분 물에 소금이 약간.',makeup:['물(H₂O)','염화나트륨(NaCl)','요소'],history:'포유류의 체온 조절 기능.',use:'체온 조절, 노폐물 배출.',risk:'없음. 많이 흘리면 탈수·전해질 손실.'},
  {id:'stomach_acid',name:'위산',kind:'compound',emoji:'🔥',aliases:['위액'],def:'음식을 소화시키는 강한 산. 염산(HCl).',makeup:['염산(HCl)'],history:'소화계 진화의 산물.',use:'음식 분해, 살균.',risk:'역류 시 식도 손상(역류성 식도염).'},

/* ===== 사전 ===== */
function buildChips(){
  $('chips').innerHTML=CHIP_WORDS.map(w=>`<button class="chip" data-w="${w}">${w}</button>`).join('');
}
$('chips').addEventListener('click',e=>{
  const c=e.target.closest('.chip'); if(!c)return;
  $('dictSearch').value=c.dataset.w; runDictSearch();
});
$('dictSearch').addEventListener('input',runDictSearch);
$('dictClear').addEventListener('click',()=>{
  $('dictSearch').value=''; runDictSearch(); $('dictSearch').focus();
});
function runDictSearch(){
  const q=$('dictSearch').value.trim().toLowerCase();
  const box=$('dictResults');
  $('dictClear').classList.toggle('show', $('dictSearch').value.length>0);
  if(!q){ box.innerHTML=''; $('chips').style.display='flex'; return; }
  $('chips').style.display='none';
  let hits;
  if(q==='내 약'||q==='내약'||q==='약'||q==='medicine'){
    hits=SUBSTANCES.filter(s=>s.kind==='medicine');
  } else {
    hits=SUBSTANCES.filter(s=>s._keys.some(k=>k.includes(q))||s.def.toLowerCase().includes(q));
  }
  if(hits.length===0){
    box.innerHTML=`<div class="noHit">"<b>${escapeHtml($('dictSearch').value)}</b>"에 해당하는 물질이 아직 없어요.<br><br>콜라, 손톱, 유리, 표백제, 술, 녹 같은<br>일상 물질을 검색해보세요.</div>`;
    return;
  }
  box.innerHTML=hits.map(cardHtml).join('')+`<div id="dictCount">${hits.length}개 찾음 · 사전에 ${SUBSTANCES.length}개 수록</div>`;
}
$('dictResults').addEventListener('touchstart',()=>{$('dictSearch').blur();},{passive:true});
$('dictBody').addEventListener('scroll',()=>{if(document.activeElement===$('dictSearch'))$('dictSearch').blur();},{passive:true});
function kindLabel(k){return k==='compound'?'화합물':k==='mixture'?'혼합물':k==='medicine'?'약':k==='drug'?'마약(위험)':'소재';}
function cardHtml(s){
  const isMed=s.kind==='medicine';
  const isDrug=s.kind==='drug';
  const makeupLabel=(isMed||isDrug)?'주요 성분':'무엇으로 이뤄졌나';
  const histLabel=isMed?'특징':'역사';
  const useLabel='쓰임';
  const riskLabel=isMed?'주의':'위험';
  return `<div class="subCard${isMed?' med':''}${isDrug?' drug':''}">
    <div class="sHead"><span class="sEmoji">${s.emoji||'•'}</span><span class="sName">${s.name}</span><span class="sKind${isMed?' kMed':''}${isDrug?' kDrug':''}">${kindLabel(s.kind)}</span></div>
    <div class="sDef">${escapeHtml(s.def)}</div>
    <div class="sMakeup"><div class="sLabel">${makeupLabel}</div>
      <div class="makeChips">${s.makeup.map(m=>`<span class="makeChip">${escapeHtml(m)}</span>`).join('')}</div></div>
    <div class="sRows">
      <div class="sRow"><span class="rk">${histLabel}</span><span class="rv">${escapeHtml(s.history)}</span></div>
      <div class="sRow"><span class="rk">${useLabel}</span><span class="rv">${escapeHtml(s.use)}</span></div>
      <div class="sRow${/⚠️|위험|화상|독|유독|발진|금단|의존/.test(s.risk)?' danger':''}"><span class="rk">${riskLabel}</span><span class="rv">${escapeHtml(s.risk)}</span></div>
    </div>
    ${isDrug?`<div class="drugEl"><span class="sLabel">들어가는 원소</span> <span class="elList">${(s.elements||[]).join(' · ')}</span></div>`:''}
    ${isMed?'<div class="medNote">※ 일반 정보예요. 복용·중단은 꼭 담당 의사·약사와 상의하세요.</div>':''}
    ${isDrug?'<div class="drugNote">※ 마약류는 소지·사용 자체가 불법이며 생명을 위협합니다. 이 정보는 경각심을 위한 것입니다. 중독·도움이 필요하면 1342(한국 마약류 상담)로 연락하세요.</div>':''}</div>`;
}

document.querySelectorAll('.et').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.et').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  const tab=t.dataset.tab;
  const isElem=tab==='elem';
  $('elSearchRow').style.display=isElem?'flex':'none';
  $('recoRow').style.display=isElem?'flex':'none';
  $('ptGrid').style.display=isElem?'grid':'none';
  $('tableWrap').style.display=tab==='table'?'block':'none';
  if(tab==='table'){ buildTable(); $('elInfo').classList.remove('show'); }
}));
/* 조합표: 화합물별 "원소 조합 → 물질" 표 */
function buildTable(){
  if($('tableWrap').dataset.built)return;
  // 화합물을 원소 종류 수 적은 것부터 정렬
  const rows=COMPOUNDS.slice().sort((a,b)=>Object.keys(a.el).length-Object.keys(b.el).length);
  let html='<div id="tableLabel">원소를 합치면 이런 물질이 돼요 · 누르면 칠판에 채워져요</div><div id="tableList">';
  rows.forEach(c=>{
    const recipe=Object.keys(c.el).map(s=>`${s}${c.el[s]>1?`<sub>${c.el[s]}</sub>`:''}`).join(' + ');
    html+=`<button class="tableRow" data-f="${c.f}">
      <span class="trRecipe">${recipe}</span>
      <span class="trArrow">→</span>
      <span class="trResult"><b>${c.f}</b> ${c.ko.replace(/\(.*\)/,'')}</span>
    </button>`;
  });
  html+='</div>';
  $('tableWrap').innerHTML=html;
  $('tableWrap').dataset.built='1';
  $('tableList').addEventListener('click',e=>{const b=e.target.closest('.tableRow');if(b)fillRecipe(b.dataset.f);});
}
function fillRecipe(f){
  const c=COMPOUNDS.find(x=>x.f===f); if(!c)return;
  board={}; Object.keys(c.el).forEach(s=>{board[s]=c.el[s];discoveredElements.add(s);});
  renderBoard(); clearResult();
  toast(c.ko.replace(/\(.*\)/,'')+' · 엔터를 눌러요');
}
function buildPicker(){
  $('recoRow').innerHTML='<div id="recoLabel">자주 쓰는 원소</div>'+RECO.map(s=>ptCell(BY_SYM[s],true)).join('');
  $('ptGrid').innerHTML=ELEMENTS.map(e=>ptCell(e,false)).join('');
}
function ptCell(e,reco){return `<div class="pt${reco?' reco':''}" data-sym="${e.s}"><span class="ptn">${e.n}</span><span class="pts">${e.s}</span></div>`;}
$('recoRow').addEventListener('click',onPick); $('ptGrid').addEventListener('click',onPick);
function onPick(e){const c=e.target.closest('.pt');if(!c)return;$('elSearch').blur();showElInfo(c.dataset.sym);}
function showElInfo(sym){const e=BY_SYM[sym];
  // 이 원소가 들어가는 화합물 찾기
  const related=COMPOUNDS.filter(c=>c.el[sym]).slice(0,12);
  const recipeChips = related.length
    ? `<div class="eiRecipes"><div class="eiRLabel">${e.ko}(${sym})로 만들 수 있어요 · 누르면 채워져요</div><div class="eiRList">${related.map(c=>`<button class="recipeBtn" data-f="${c.f}">${c.ko.replace(/\(.*\)/,'')}<span class="rf">${c.f}</span></button>`).join('')}</div></div>`
    : `<div class="eiRecipes"><div class="eiRLabel" style="color:var(--chalk-dim)">${e.ko}만으로 만드는 기본 화합물은 목록에 없어요. '담기'로 직접 조합해보세요.</div></div>`;
  $('elInfo').innerHTML=`<div class="eiTop"><div class="shBadge"><span class="num">${e.n}</span><span class="sym">${e.s}</span></div><div class="eiName">${e.ko} <span>${e.s} · ${e.n}번</span></div><button class="eiAdd" data-sym="${sym}">담기 +</button></div><div class="eiDesc">${e.d}</div>${recipeChips}`;
  $('elInfo').classList.add('show');}
// elInfo 안에서 담기/레시피 클릭 처리
$('elInfo').addEventListener('click',e=>{
  const add=e.target.closest('.eiAdd');
  if(add){ addToBoard(add.dataset.sym); return; }
  const rb=e.target.closest('.recipeBtn');
  if(rb){ fillRecipe(rb.dataset.f); }
});
$('elSearch').addEventListener('input',()=>{
  const q=$('elSearch').value.trim().toLowerCase();
  if(!q){ $('ptGrid').innerHTML=ELEMENTS.map(e=>ptCell(e,false)).join(''); $('recoRow').style.display='flex'; return; }
  $('recoRow').style.display='none';
  const m=ELEMENTS.filter(e=>e.ko.includes(q)||e.s.toLowerCase()===q||e.s.toLowerCase().startsWith(q)||String(e.n)===q);
  if(m.length===0){ $('ptGrid').innerHTML=`<div style="grid-column:1/-1;text-align:center;color:var(--chalk-pink);font-size:13px;padding:14px 0">"${escapeHtml($('elSearch').value)}"에 맞는 원소가 없어요</div>`; return; }
  $('ptGrid').innerHTML=m.map(e=>ptCell(e,false)).join('');
});
// 검색 후 격자/화면 터치하면 즉시 키보드 내림
$('ptGrid').addEventListener('touchstart',()=>{$('elSearch').blur();},{passive:true});
$('pickerScroll').addEventListener('scroll',()=>{if(document.activeElement===$('elSearch'))$('elSearch').blur();},{passive:true});
$('boardWrap').addEventListener('touchstart',()=>{$('elSearch').blur();},{passive:true});

/* ===== 칠판 ===== */
const eqEl=$('equation'),enterBtn=$('enterBtn'),resultEl=$('result'),molCanvas=$('molCanvas');
function addToBoard(sym){if(!discoveredElements.has(sym))discoveredElements.add(sym);board[sym]=(board[sym]||0)+1;renderBoard();clearResult();toast(BY_SYM[sym].ko+' 담음');}
function renderBoard(){
  const syms=Object.keys(board);
  if(syms.length===0){eqEl.classList.add('empty');eqEl.innerHTML='<div id="emptyHint">아래에서 원소를 골라<br>칠판에 모아보세요</div>';enterBtn.disabled=true;return;}
  eqEl.classList.remove('empty');
  eqEl.innerHTML=syms.map((s,i)=>(i>0?'<span class="plus">+</span>':'')+`<span class="token" data-sym="${s}">${s}${board[s]>1?`<span class="cnt">${board[s]}</span>`:''}<span class="x" data-rem="${s}">×</span></span>`).join('');
  enterBtn.disabled=false;
}
eqEl.addEventListener('click',e=>{const x=e.target.closest('.x');if(x){removeFromBoard(x.dataset.rem);return;}const t=e.target.closest('.token');if(t)addToBoard(t.dataset.sym);});
function removeFromBoard(sym){if(!board[sym])return;board[sym]--;if(board[sym]<=0)delete board[sym];renderBoard();}

function clearResult(){
  molCanvas.classList.remove('show');
  resultEl.querySelectorAll(':scope > *:not(#molCanvas)').forEach(n=>n.remove());
  const ph=document.createElement('div');ph.className='rPlaceholder';
  ph.innerHTML='원소를 모으고 <b style="color:var(--chalk-yellow)">엔터</b>를 누르면<br>무엇이 만들어지는지 보여줄게요';
  resultEl.appendChild(ph);
}
function setResult(html){resultEl.querySelectorAll(':scope > *:not(#molCanvas)').forEach(n=>n.remove());const d=document.createElement('div');d.innerHTML=html;resultEl.appendChild(d);}

enterBtn.addEventListener('click',submit);
function submit(){
  const syms=Object.keys(board);if(syms.length===0)return;
  const key=comboKey(board);
  const hit=COMPOUND_MAP[key]; if(hit){showCompound(hit);return;}
  const frag=FRAGMENT_MAP[key]; if(frag){showFragment(frag);return;}
  showUnknown();
}
function showCompound(c){
  const isNew=!discoveredCompounds.has(c.f); if(isNew)discoveredCompounds.add(c.f); updateDisc();
  if(c.mol){drawMolecule(normalizeMol(c));molCanvas.classList.add('show');}else molCanvas.classList.remove('show');
  const detail = (c.history||c.make||c.use||c.risk) ? `<div class="rDetail">
    ${c.history?`<div class="dRow"><span class="dk">역사</span><span class="dv">${escapeHtml(c.history)}</span></div>`:''}
    ${c.make?`<div class="dRow"><span class="dk">만드는법</span><span class="dv">${escapeHtml(c.make)}</span></div>`:''}
    ${c.use?`<div class="dRow"><span class="dk">쓰임</span><span class="dv">${escapeHtml(c.use)}</span></div>`:''}
    ${c.risk?`<div class="dRow${/⚠️|위험|화상|독|발암|폭발|사망|질식/.test(c.risk)?' danger':''}"><span class="dk">주의</span><span class="dv">${escapeHtml(c.risk)}</span></div>`:''}
  </div>` : '';
  setResult(`<div class="rFormula">${c.f}${isNew?'<span class="newTag">NEW</span>':''}</div><div class="rName">${escapeHtml(c.ko)}</div><div class="rState">${stateIcon(c.state)} ${escapeHtml(c.state||'?')}</div><div class="rDesc">${escapeHtml(c.d)}</div>${detail}`);
  if(isNew)toast('🎉 발견: '+c.ko);
}
function showFragment(f){molCanvas.classList.remove('show');setResult(`<div class="rName" style="color:var(--chalk-blue);font-size:18px">${escapeHtml(f.name)}</div><div class="rDesc">${escapeHtml(f.d)}</div>${f.hint?`<div class="rState" style="color:var(--chalk-green)">💡 ${escapeHtml(f.hint)}</div>`:''}`);}
function showUnknown(){molCanvas.classList.remove('show');setResult(`<div class="rFail">이 조합으로 만들어지는 안정한 화합물은 아직 없어요.</div><div class="rDesc" style="color:var(--chalk-dim)">원소 개수를 바꾸거나 다른 원소를 더해보세요.<br>예) 수소 2 + 산소 1 = 물 💧</div>`);}
function stateIcon(s){return s==='기체'?'☁️':s==='액체'?'💧':s==='고체'?'🧊':'•';}
function normalizeMol(c){
  const mol=c.mol;
  if(mol.ring6){
    const atoms=[],bonds=[];
    for(let i=0;i<6;i++){const a=Math.PI/2+i*Math.PI/3;atoms.push({el:'C',x:Math.cos(a),y:-Math.sin(a)});}
    for(let i=0;i<6;i++)bonds.push([i,(i+1)%6,i%2===0?2:1]);
    if(mol.hRing)for(let i=0;i<6;i++){const a=Math.PI/2+i*Math.PI/3;const hi=atoms.length;atoms.push({el:'H',x:Math.cos(a)*1.85,y:-Math.sin(a)*1.85});bonds.push([i,hi,1]);}
    return {atoms,bonds};
  }
  return mol;
}
function drawMolecule(mol){
  const c=molCanvas,dpr=Math.min(devicePixelRatio||1,2.5);const w=c.clientWidth||300,h=130;
  c.width=w*dpr;c.height=h*dpr;const x=c.getContext('2d');x.setTransform(dpr,0,0,dpr,0,0);x.clearRect(0,0,w,h);
  let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
  mol.atoms.forEach(a=>{minX=Math.min(minX,a.x);maxX=Math.max(maxX,a.x);minY=Math.min(minY,a.y);maxY=Math.max(maxY,a.y);});
  const pad=0.8;minX-=pad;maxX+=pad;minY-=pad;maxY+=pad;
  const sc=Math.min(w/(maxX-minX),h/(maxY-minY));
  const ox=w/2-((minX+maxX)/2)*sc,oy=h/2-((minY+maxY)/2)*sc;
  const P=a=>({x:ox+a.x*sc,y:oy+a.y*sc});
  (mol.bonds||[]).forEach(b=>{
    const p1=P(mol.atoms[b[0]]),p2=P(mol.atoms[b[1]]),order=b[2]||1;
    const dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.hypot(dx,dy),nx=-dy/len,ny=dx/len;
    const offs=order===1?[0]:order===2?[-3.5,3.5]:[-5,0,5];
    x.strokeStyle='#c9d6cc';x.lineWidth=order===1?6:4;
    offs.forEach(o=>{x.beginPath();x.moveTo(p1.x+nx*o,p1.y+ny*o);x.lineTo(p2.x+nx*o,p2.y+ny*o);x.stroke();});
  });
  mol.atoms.forEach(a=>{
    const p=P(a),r=atomRadius(a.el)*sc*0.5,col=atomColor(a.el);
    const g=x.createRadialGradient(p.x-r*0.35,p.y-r*0.35,r*0.2,p.x,p.y,r);
    g.addColorStop(0,lighten(col,0.5));g.addColorStop(1,col);
    x.fillStyle=g;x.beginPath();x.arc(p.x,p.y,r,0,7);x.fill();
    x.strokeStyle='rgba(0,0,0,.25)';x.lineWidth=1;x.stroke();
    x.fillStyle=labelColor(col);x.font=`bold ${Math.max(11,r*0.9)}px sans-serif`;x.textAlign='center';x.textBaseline='middle';x.fillText(a.el,p.x,p.y);
  });
}
function lighten(hex,amt){const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;r=Math.round(r+(255-r)*amt);g=Math.round(g+(255-g)*amt);b=Math.round(b+(255-b)*amt);return `rgb(${r},${g},${b})`;}
function labelColor(hex){const n=parseInt(hex.slice(1),16);const l=((n>>16&255)*0.3+(n>>8&255)*0.59+(n&255)*0.11);return l>150?'#222':'#fff';}

$('clearBtn').addEventListener('click',()=>{board={};renderBoard();clearResult();});
$('dexBtn').addEventListener('click',openDex);
$('dexClose').addEventListener('click',()=>$('dexModal').classList.remove('show'));
function openDex(){
  const found=[...discoveredCompounds];const list=$('dexList');
  if(found.length===0){list.innerHTML='<div class="dexEmpty">아직 발견한 화합물이 없어요.<br>원소를 모아 엔터를 눌러보세요!</div>';}
  else{const byF={};COMPOUNDS.forEach(c=>byF[c.f]=c);
    list.innerHTML=found.map(f=>{const c=byF[f]||{f,ko:'',state:'',d:''};return `<div class="dexItem"><div class="df">${c.f} <span style="font-size:12px;color:var(--chalk-dim)">${stateIcon(c.state)} ${c.state||''}</span></div><div class="dn">${escapeHtml(c.ko||'')}</div><div class="dd">${escapeHtml(c.d||'')}</div></div>`;}).join('')+`<div class="dexEmpty" style="margin-top:14px;font-size:12px">${found.length}개 발견</div>`;}
  $('dexModal').classList.add('show');
}
function updateDisc(){$('discCount').textContent=discoveredCompounds.size;}
let toastT;function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1300);}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

buildChips(); buildPicker(); renderBoard();
// 기본 탭은 '원소' (검색창+격자)
$('elSearchRow').style.display='flex'; $('tableWrap').style.display='none';
</script>
